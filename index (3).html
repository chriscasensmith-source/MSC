<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Monthly Supper Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #0e0a0d;
    color: #fbf2e3;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(1200px 600px at 20% -10%, rgba(232,105,58,0.18), transparent 60%),
      radial-gradient(900px 500px at 100% 20%, rgba(164,124,240,0.15), transparent 60%),
      radial-gradient(800px 500px at -10% 60%, rgba(63,185,138,0.10), transparent 60%);
  }

  .shell {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 80px;
    position: relative;
  }

  /* ============================================================
     SECTION NAV — sticky pill
     ============================================================ */
  .snav {
    position: sticky; top: 0; z-index: 50;
    display: flex; gap: 4px; overflow-x: auto;
    padding: 12px 4px 12px;
    margin: 0 -16px 0;
    padding-left: 16px; padding-right: 16px;
    background: linear-gradient(to bottom, #0e0a0d 70%, transparent);
    scrollbar-width: none;
  }
  .snav::-webkit-scrollbar { display: none; }
  .snav-btn {
    flex-shrink: 0;
    border: 1px solid rgba(251,242,227,0.15);
    background: rgba(251,242,227,0.04);
    color: rgba(251,242,227,0.7);
    padding: 8px 14px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; font-weight: 500;
    transition: all 0.2s;
  }
  .snav-btn[data-active="1"] {
    background: #fbf2e3; color: #1a1410; border-color: #fbf2e3;
  }

  /* ============================================================
     HERO
     ============================================================ */
  .hero { padding: 12px 0 28px; position: relative; }
  .hero-marquee {
    overflow: hidden; white-space: nowrap;
    margin: 0 -16px 18px; padding: 8px 0;
    border-top: 1px solid rgba(251,242,227,0.1);
    border-bottom: 1px solid rgba(251,242,227,0.1);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 3px; color: #f1b740;
  }
  .hero-marquee span {
    display: inline-block;
    animation: marquee 30s linear infinite;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .hero-top {
    display: flex; gap: 14px; align-items: stretch; margin-bottom: 16px;
  }
  .logo-stamp {
    width: 88px; height: 88px; flex-shrink: 0;
    border: 2px solid #fbf2e3; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transform: rotate(-6deg);
    box-shadow: inset 0 0 0 4px #0e0a0d, inset 0 0 0 5px #fbf2e3;
  }
  .stamp-inner {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.1;
  }
  .stamp-row1 { font-size: 8px; letter-spacing: 2px; opacity: 0.7; }
  .stamp-row2 { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 22px; line-height: 1; margin: 2px 0; }
  .stamp-row3 { font-size: 9px; letter-spacing: 2px; }

  .hero-meta { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .hero-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(251,242,227,0.55); margin-bottom: 8px;
  }
  .hero-members {
    display: flex; flex-wrap: wrap; gap: 10px 14px;
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 18px; line-height: 1;
  }
  .hero-member { white-space: nowrap; }

  .hero-title {
    font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400;
    font-size: clamp(56px, 18vw, 88px);
    line-height: 0.88;
    margin: 6px 0 14px;
    color: #fbf2e3;
    letter-spacing: -0.02em;
    display: flex; flex-direction: column;
  }
  .hero-title > span { display: block; }
  .hero-amp, .hero-amp2 {
    font-family: 'JetBrains Mono', monospace; font-style: normal;
    color: #e8693a; font-size: 0.4em; line-height: 1;
    margin: -0.1em 0 -0.1em 0.4em;
    display: inline-block;
    transform: rotate(45deg);
  }
  .hero-amp2 { color: #f1b740; }

  .hero-sub {
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: rgba(251,242,227,0.7); line-height: 1.4;
    margin-bottom: 22px; max-width: 380px;
  }
  .hero-avg {
    color: #f1b740; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  .hero-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .hero-grid > *:first-child { grid-column: 1 / -1; }

  .stat-tile { animation: pop 0.6s cubic-bezier(.2,.7,.3,1.3) backwards; }
  @keyframes pop {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to { opacity: 1; transform: none; }
  }
  .big-tile {
    background: #f1b740 !important; color: #1a1410 !important;
    border-radius: 18px; padding: 18px;
    position: relative; overflow: hidden;
    grid-column: 1 / -1;
    border: 1px solid rgba(26,20,16,0.15);
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }
  .dark-tile {
    background: #1a1014 !important; color: #fbf2e3 !important;
    border-radius: 18px; padding: 18px;
    position: relative; overflow: hidden;
    border: 1px solid rgba(251,242,227,0.1);
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }
  .comeback {
    background: #3fb98a !important; color: #062018 !important;
    border-radius: 18px; padding: 14px;
    grid-column: 1 / -1;
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }
  .tile-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(26,20,16,0.65); margin-bottom: 6px;
  }
  .tile-kicker.dark { color: rgba(251,242,227,0.5); }
  .tile-name {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 28px; line-height: 1; color: #1a1410;
  }
  .tile-name.dark { color: #fbf2e3; }
  .tile-meta {
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    color: rgba(26,20,16,0.65); margin-top: 4px;
  }
  .tile-meta.dark { color: rgba(251,242,227,0.55); }

  /* ============================================================
     SECTIONS
     ============================================================ */
  .section { padding: 56px 0 16px; scroll-margin-top: 70px; }
  .section.dark {
    background: #07050a;
    margin: 0 -16px;
    padding: 56px 16px 16px;
    border-radius: 28px;
    border: 1px solid rgba(251,242,227,0.06);
  }

  .section-head-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; margin-bottom: 14px;
  }

  .filter-btn {
    flex-shrink: 0; align-self: flex-start;
    border: 1px solid #fbf2e3; background: transparent; color: #fbf2e3;
    padding: 8px 14px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .filter-count {
    background: #e8693a; color: #1a0a05;
    border-radius: 999px;
    padding: 1px 7px; font-size: 10px; min-width: 18px;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* ============================================================
     FILTERS
     ============================================================ */
  .filters {
    background: rgba(251,242,227,0.04);
    border: 1px solid rgba(251,242,227,0.08);
    border-radius: 18px; padding: 14px;
    margin-bottom: 16px;
    display: flex; flex-direction: column; gap: 12px;
    animation: slidein 0.25s ease;
  }
  @keyframes slidein {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: none; }
  }
  .filter-row { display: flex; flex-direction: column; gap: 8px; }
  .filter-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(251,242,227,0.55);
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    border: 1px solid rgba(251,242,227,0.15);
    background: rgba(251,242,227,0.04); color: rgba(251,242,227,0.85);
    padding: 7px 11px; border-radius: 999px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .chip[data-active="1"] {
    background: #fbf2e3; color: #1a1410; border-color: #fbf2e3;
  }
  .slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px; border-radius: 999px;
    background: rgba(251,242,227,0.15); outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px; border-radius: 50%;
    background: #f1b740; border: 2px solid #1a1410; cursor: pointer;
  }
  .slider::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%;
    background: #f1b740; border: 2px solid #1a1410; cursor: pointer;
  }
  .sel {
    background: rgba(251,242,227,0.05);
    border: 1px solid rgba(251,242,227,0.15);
    color: #fbf2e3; padding: 9px 12px; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    width: 100%;
  }

  .feed-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(251,242,227,0.45); margin-bottom: 14px;
  }

  /* ============================================================
     RESTAURANT CARD
     ============================================================ */
  .feed { display: flex; flex-direction: column; gap: 18px; }
  .rcard {
    background: #fbf2e3; color: #1a1410;
    border-radius: 24px; overflow: hidden;
    box-shadow: 0 2px 0 rgba(0,0,0,0.5), 0 18px 40px -20px rgba(0,0,0,0.6);
    border: 1px solid rgba(26,20,16,0.08);
    animation: cardIn 0.5s cubic-bezier(.2,.7,.3,1.1) backwards;
    cursor: pointer;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: none; }
  }
  .rcard-photo {
    position: relative;
    aspect-ratio: 5 / 4;
    overflow: hidden;
    background: #1a1410;
  }
  .rcard-photo img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .rcard-photo-grad {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
  .rcard-badges {
    position: absolute; top: 12px; left: 12px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .rcard-avg-float {
    position: absolute; bottom: -16px; right: 14px;
    z-index: 2;
  }
  .rcard-body { padding: 24px 18px 18px; }
  .rcard-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2.5px;
    color: #6b5a47; margin-bottom: 4px;
  }
  .rcard-name {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-weight: 400; font-size: 32px; line-height: 1.02;
    margin: 0 0 8px; color: #1a1410;
    letter-spacing: -0.01em;
  }
  .rcard-stars { margin-bottom: 14px; }
  .rcard-members {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    padding: 12px 0; border-top: 1px dashed rgba(26,20,16,0.15);
    border-bottom: 1px dashed rgba(26,20,16,0.15);
  }
  .rcard-member { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .rcard-member-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 600;
  }
  .rcard-note {
    margin-top: 14px;
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 16px; line-height: 1.35; color: #4a3a2a;
    position: relative; padding-left: 22px;
  }
  .rcard-note-mark {
    position: absolute; left: 0; top: -6px;
    font-family: 'Instrument Serif', serif;
    font-size: 40px; color: #e8693a; line-height: 1;
  }

  /* cancelled */
  .cancelled-card {
    padding: 36px 18px;
    background: repeating-linear-gradient(
      45deg,
      #fbf2e3 0 12px, #f4e5c8 12px 24px
    );
    color: #1a1410; position: relative;
    text-align: center;
    border-radius: 24px;
  }
  .cancelled-stamp {
    display: inline-block;
    border: 3px solid #e8693a; color: #e8693a;
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 18px; letter-spacing: 5px;
    padding: 8px 14px;
    transform: rotate(-4deg);
    margin-bottom: 14px;
  }
  .cancelled-month {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 36px; color: #1a1410; line-height: 1;
  }
  .cancelled-sub {
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    color: #6b5a47; margin-top: 8px;
  }

  .empty {
    background: rgba(251,242,227,0.04);
    border: 1px dashed rgba(251,242,227,0.15);
    padding: 40px 20px; border-radius: 18px;
    text-align: center;
    font-family: 'Instrument Serif', serif; font-style: italic;
    color: rgba(251,242,227,0.6); font-size: 18px;
  }

  /* ============================================================
     LEADERBOARDS
     ============================================================ */
  .lb-tabs {
    display: flex; gap: 6px; overflow-x: auto;
    padding-bottom: 10px; margin: 0 -16px 14px; padding-left: 16px; padding-right: 16px;
    scrollbar-width: none;
  }
  .lb-tabs::-webkit-scrollbar { display: none; }
  .lb-tab {
    flex-shrink: 0;
    border: 1px solid rgba(251,242,227,0.18);
    background: rgba(251,242,227,0.04); color: rgba(251,242,227,0.85);
    padding: 8px 13px; border-radius: 999px;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    font-size: 12px; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .lb-sub {
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    color: rgba(251,242,227,0.55); margin-bottom: 12px;
  }
  .lb-list {
    list-style: none; padding: 0; margin: 0;
    display: flex; flex-direction: column; gap: 8px;
  }
  .lb-row {
    background: rgba(251,242,227,0.04);
    border: 1px solid rgba(251,242,227,0.08);
    border-radius: 16px; padding: 10px 12px;
    display: grid; grid-template-columns: 32px 56px 1fr auto; gap: 12px;
    align-items: center;
  }
  .lb-rank {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 30px; line-height: 1;
  }
  .lb-thumb {
    width: 56px; height: 56px; border-radius: 12px;
    overflow: hidden; background: #1a1410;
  }
  .lb-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .lb-thumb-empty {
    width: 100%; height: 100%;
    background: repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 6px, rgba(255,255,255,0.08) 6px 12px);
  }
  .lb-name {
    font-family: 'DM Sans', sans-serif; font-weight: 600;
    font-size: 15px; color: #fbf2e3;
  }
  .lb-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(251,242,227,0.5); margin-top: 2px;
  }

  /* ============================================================
     TIMELINE
     ============================================================ */
  .tl-scroll {
    overflow-x: auto;
    margin: 0 -16px;
    padding: 6px 16px 18px;
    scrollbar-width: thin;
    scrollbar-color: rgba(251,242,227,0.2) transparent;
  }
  .tl-track { display: flex; gap: 20px; min-width: max-content; }
  .tl-year {
    flex-shrink: 0;
    border-left: 2px solid #e8693a;
    padding-left: 14px;
  }
  .tl-year-label {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 30px; color: #f1b740; margin-bottom: 10px;
    line-height: 1;
  }
  .tl-months {
    display: grid; grid-template-columns: repeat(2, 130px); gap: 10px;
  }
  .tl-cell {
    border-radius: 14px;
    padding: 10px 10px 12px;
    min-height: 140px;
    position: relative;
    display: flex; flex-direction: column;
  }
  .tl-month {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(251,242,227,0.55); margin-bottom: 6px;
  }
  .tl-empty {
    background: rgba(251,242,227,0.02);
    border: 1px dashed rgba(251,242,227,0.07);
  }
  .tl-cancelled {
    background: rgba(232,105,58,0.08);
    border: 1px dashed #e8693a;
    align-items: center; justify-content: center;
  }
  .tl-x {
    font-size: 36px; color: #e8693a;
    font-family: 'JetBrains Mono', monospace; font-weight: 300;
    line-height: 1;
  }
  .tl-cancel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #e8693a; margin-top: 4px;
  }
  .tl-visit {
    background: #fbf2e3; color: #1a1410;
    box-shadow: 0 2px 0 rgba(0,0,0,0.3);
  }
  .tl-visit .tl-month { color: #6b5a47; }
  .tl-img {
    width: 100%; aspect-ratio: 1; object-fit: cover;
    border-radius: 8px; background: #1a1410;
    margin-bottom: 6px; display: block;
  }
  .tl-img-empty {
    display: flex; align-items: center; justify-content: center;
    color: rgba(26,20,16,0.3); font-size: 24px;
    background: repeating-linear-gradient(135deg, rgba(26,20,16,0.04) 0 6px, rgba(26,20,16,0.08) 6px 12px);
  }
  .tl-rname {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 15px; line-height: 1.1; color: #1a1410;
  }
  .tl-rscore {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 11px; color: #e8693a; margin-top: 3px;
  }
  .tl-repeat-pin {
    position: absolute; top: 6px; right: 6px;
    background: #f1b740; color: #1a1410;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 1px 0 rgba(0,0,0,0.3);
  }

  /* ============================================================
     MEMBER CARDS
     ============================================================ */
  .mc-honors {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;
  }
  .mc-honor {
    padding: 14px; border-radius: 16px;
    background: rgba(251,242,227,0.04);
    border: 1.5px solid;
  }
  .mc-honor-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(251,242,227,0.55); margin-bottom: 6px;
  }
  .mc-honor-name {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 28px; line-height: 1;
  }
  .mc-honor-stat {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 12px; color: rgba(251,242,227,0.7); margin-top: 4px;
  }
  .mc-cards { display: flex; flex-direction: column; gap: 12px; }
  .mc-card {
    background: rgba(251,242,227,0.04);
    border: 1.5px solid;
    border-radius: 18px; padding: 14px;
  }
  .mc-card-head {
    display: flex; align-items: center; gap: 12px;
  }
  .mc-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 24px; font-weight: 400; color: #0e0a0d;
    flex-shrink: 0;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.18);
  }
  .mc-card-name {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 22px; line-height: 1;
  }
  .mc-card-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(251,242,227,0.5); margin-top: 4px;
  }
  .mc-bigavg {
    margin-left: auto;
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 36px; line-height: 1; color: #fbf2e3;
  }
  .mc-bigavg-s {
    font-family: 'JetBrains Mono', monospace; font-style: normal;
    font-size: 11px; opacity: 0.5; margin-left: 2px;
  }
  .mc-bar-wrap {
    margin-top: 14px;
    height: 8px; border-radius: 999px;
    background: rgba(251,242,227,0.06); overflow: hidden;
  }
  .mc-bar { height: 100%; border-radius: 999px; transition: width 0.6s; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); }
  .mc-mini {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px;
  }
  .mc-mini-cell {
    background: rgba(0,0,0,0.25); border-radius: 12px; padding: 10px;
  }
  .mc-mini-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(251,242,227,0.5);
  }
  .mc-mini-val {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 22px; line-height: 1; margin: 4px 0 2px;
  }
  .mc-mini-rest {
    font-family: 'DM Sans', sans-serif; font-size: 11px;
    color: rgba(251,242,227,0.6); line-height: 1.2;
  }

  /* ============================================================
     REPEATS
     ============================================================ */
  .rep-stack { display: flex; flex-direction: column; gap: 14px; }
  .rep-card {
    background: #fbf2e3; color: #1a1410;
    border-radius: 20px; padding: 16px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }
  .rep-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .rep-name {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-weight: 400; font-size: 26px; line-height: 1; margin: 0;
  }
  .rep-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #6b5a47;
  }
  .rep-trend {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 999px;
    background: rgba(232,105,58,0.15); color: #b14820;
    margin-bottom: 12px;
  }
  .rep-trend[data-up="1"] {
    background: rgba(63,185,138,0.18); color: #1f7553;
  }
  .rep-trend-arrow { font-size: 14px; }
  .rep-trend-delta { font-weight: 700; }
  .rep-track {
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto; padding-bottom: 6px;
    scrollbar-width: none;
  }
  .rep-track::-webkit-scrollbar { display: none; }
  .rep-visit { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .rep-visit-thumb {
    width: 64px; height: 64px; border-radius: 12px;
    overflow: hidden; background: #1a1410; flex-shrink: 0;
  }
  .rep-visit-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .rep-visit-empty {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.3); font-size: 22px;
  }
  .rep-visit-meta { min-width: 110px; }
  .rep-visit-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #6b5a47;
  }
  .rep-visit-name {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 15px; line-height: 1.1; color: #1a1410;
    margin: 2px 0 6px;
  }
  .rep-arrow {
    font-family: 'JetBrains Mono', monospace;
    color: #e8693a; font-size: 18px; padding: 0 2px;
  }

  /* ============================================================
     GALLERY
     ============================================================ */
  .gallery {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .gal-tile { cursor: pointer; }
  .gal-cap { margin-top: 6px; padding: 0 2px; }
  .gal-cap-name {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 16px; line-height: 1.1; color: #fbf2e3;
  }
  .gal-cap-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(251,242,227,0.5); margin-top: 3px;
  }

  /* ============================================================
     DETAIL OVERLAY
     ============================================================ */
  .detail-bd {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadein 0.2s;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .detail-card {
    background: #fbf2e3; color: #1a1410;
    width: 100%; max-width: 480px;
    max-height: 92vh; overflow-y: auto;
    border-radius: 28px 28px 0 0;
    position: relative;
    animation: slideup 0.3s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes slideup {
    from { transform: translateY(100%); }
    to { transform: none; }
  }
  .detail-close {
    position: absolute; top: 14px; right: 14px; z-index: 2;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(26,20,16,0.7); color: #fbf2e3;
    border: none; font-size: 24px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .detail-photo {
    aspect-ratio: 5 / 4; overflow: hidden; background: #1a1410;
  }
  .detail-photo img { width: 100%; height: 100%; object-fit: cover; }
  .detail-body { padding: 22px 20px 28px; }
  .detail-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: #6b5a47;
  }
  .detail-name {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-weight: 400; font-size: 40px; line-height: 1;
    margin: 6px 0 0; letter-spacing: -0.01em;
  }
  .detail-grid {
    margin-top: 18px;
    display: flex; flex-direction: column; gap: 10px;
    padding: 14px; background: rgba(26,20,16,0.05); border-radius: 16px;
  }
  .detail-mrow { display: flex; align-items: center; }
  .detail-note {
    margin-top: 16px; padding: 14px; border-radius: 14px;
    background: #1a1410; color: #fbf2e3;
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 16px; line-height: 1.4;
  }
  .detail-note-lbl {
    font-family: 'JetBrains Mono', monospace; font-style: normal;
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: #f1b740; margin-bottom: 6px;
  }

  /* ============================================================
     FOOTER
     ============================================================ */
  .footer {
    text-align: center; padding: 60px 20px 20px;
  }
  .footer-rule {
    width: 60px; height: 1px; background: #e8693a;
    margin: 0 auto 18px;
  }
  .footer-title {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 26px; color: #fbf2e3;
    letter-spacing: 0.04em;
  }
  .footer-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(251,242,227,0.55); margin-top: 8px;
  }
  .footer-meta {
    font-family: 'DM Sans', sans-serif; font-size: 11px;
    color: rgba(251,242,227,0.35); margin-top: 14px;
  }

  /* ============================================================
     DESKTOP — center the mobile frame
     ============================================================ */
  @media (min-width: 640px) {
    body {
      padding: 24px 0;
    }
    .shell {
      box-shadow: 0 30px 80px -20px rgba(0,0,0,0.7);
      border-radius: 32px;
      background: #0e0a0d;
      background-image:
        radial-gradient(800px 400px at 20% -10%, rgba(232,105,58,0.18), transparent 60%),
        radial-gradient(600px 400px at 100% 20%, rgba(164,124,240,0.15), transparent 60%);
      padding-left: 20px; padding-right: 20px;
    }
    .snav { top: 0; }
  }
</style>
